name: arcade_health
description: "Arcade Health — suivi santé (sommeil, HRV, VO2 max...) et sport (course, muscu...)."
publish_to: 'none'

version: 1.0.1+2

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Réseau souverain partagé (écriture unifiée dans le vault, note du jour)
  mycelium:
    path: ../../mycelium

  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  intl: ^0.20.2
  flutter_riverpod: ^2.5.1
  path_provider: ^2.0.0
  file_picker: ^11.0.2
  confetti: ^0.8.0
  flutter_tts: ^4.2.0
  wakelock_plus: ^1.2.8
  health: ^13.3.1
  google_sign_in: ^6.2.1
  http: ^1.2.2
  app_links: ^6.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: "^0.14.4"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Regular.ttf
          weight: 400
        - asset: assets/fonts/Orbitron-Medium.ttf
          weight: 500
        - asset: assets/fonts/Orbitron-Bold.ttf
          weight: 700
        - asset: assets/fonts/Orbitron-Black.ttf
          weight: 900