workflows:
  ios-workflow:
    name: iOS Build

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - flutter pub get
      - flutter build ios --release --no-codesign

      - name: Create IPA
        script: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r Runner.ipa Payload

    artifacts:
      - build/ios/iphoneos/Runner.ipa  # ← dito dapat