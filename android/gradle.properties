org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=384m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=false
# Fix: Kotlin incremental compilation crashes when pub cache (D:) and project (E:) are on different drives
kotlin.incremental=false
# Disable daemon to avoid extra JVM process eating RAM
org.gradle.daemon=false
